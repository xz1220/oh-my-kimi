name: Validate

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      # kimi-cli is required so test_agents.py can really exercise
      # kimi_cli.agentspec.load_agent_spec; if pip install fails (e.g. PyPI
      # outage), continue without it so the cheaper schema/install tests still
      # run, but log a notice so the gap is visible.
      - name: Install kimi-cli for deep schema check
        run: python -m pip install kimi-cli || echo "::notice::kimi-cli not installed; test_agents.py kimi-loader test will silently skip"
      - run: bash scripts/validate.sh

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install mkdocs mkdocs-material
      - run: mkdocs build --strict
